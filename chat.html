<!-- Chat Modal -->
<div class="fixed inset-0 z-50 flex items-end justify-center md:items-center md:p-6">
    <div class="relative w-full max-w-2xl glass-modal rounded-t-3xl md:rounded-3xl flex flex-col h-[94vh] md:h-[85vh] overflow-hidden">
        
        <!-- Header -->

        <!-- Sample Questions & Input -->
        <div class="px-6 py-6 space-y-4 bg-white/[0.04] border-t border-white/20 shrink-0">
            
            <!-- Sample Question Chips with Scroll -->

                    <button onclick="askSampleQuestion('What has Lisa deliberately chosen NOT to build, and why?')" class="px-4 py-2 rounded-full bg-white/10 border border-white/20 text-white/70 text-xs font-light hover:bg-white/20 transition-colors whitespace-nowrap">

                        Raising a round?
                    </button>
                    <button onclick="askSampleQuestion('Walk me through the Dauphin Lake Watch project')" class="px-4 py-2 rounded-full bg-white/10 border border-white/20 text-white/70 text-xs font-light hover:bg-white/20 transition-colors whitespace-nowrap">

                    </button>
                    <button onclick="askSampleQuestion('How would Lisa handle live agricultural or sensor data for a farm operation?')" class="px-4 py-2 rounded-full bg-white/10 border border-white/20 text-white/70 text-xs font-light hover:bg-white/20 transition-colors whitespace-nowrap">
                        Agri &amp; live data?
                    </button>
                    <button onclick="askSampleQuestion('What technologies does she use?')" class="px-4 py-2 rounded-full bg-white/10 border border-white/20 text-white/70 text-xs font-light hover:bg-white/20 transition-colors whitespace-nowrap">
                        Tech stack?
                    </button>
                </div>

                <!-- Right Arrow -->
                <button id="scrollRight" onclick="scrollChips('right')" class="absolute right-0 top-1/2 -translate-y-1/2 z-10 bg-navy-deep/80 backdrop-blur-md border border-white/20 rounded-full w-8 h-8 flex items-center justify-center text-white/70 hover:text-white hover:bg-navy-deep transition-all shadow-lg">

            <!-- Input Form -->
            <form id="chatForm" class="flex gap-2">

                    type="text"

                >
                <button 
                    type="submit"
                    id="sendButton"
                    class="px-6 py-3 rounded-xl bg-gradient-to-r from-amber-600 to-amber-700 text-white font-normal hover:shadow-[0_0_20px_rgba(201,168,124,0.5)] active:scale-95 transition-all flex items-center gap-2 text-sm"
                >

            </p>

        </div>

<script>
let messagesRemaining = 10;

// ===== Conversation memory — the thread Stack actually sees =====
const chatHistory = [];
const MAX_HISTORY_MESSAGES = 20; // last 10 exchanges

// ===== Safe rendering =====
// All visitor and model text enters the DOM as text nodes, never as HTML.
// URLs on whitelisted hosts become real links; everything else stays plain text.
const LINK_HOSTS = ['iconnect.studio', 'www.iconnect.studio', 'dauphinlakewatch.ca', 'www.dauphinlakewatch.ca'];

function renderSafeText(container, text) {
    const urlPattern = /(https?:\/\/[^\s]+|(?:iconnect\.studio|dauphinlakewatch\.ca)\/[^\s]*|(?:iconnect\.studio|dauphinlakewatch\.ca)(?=[\s.,;:!?)]|$))/g;
    let lastIndex = 0;
    let match;
    while ((match = urlPattern.exec(text)) !== null) {
        if (match.index > lastIndex) {
            container.appendChild(document.createTextNode(text.slice(lastIndex, match.index)));
        }
        let raw = match[0];
        // Trim trailing punctuation that's sentence, not URL
        const trimmed = raw.replace(/[.,;:!?)]+$/, '');
        const trailing = raw.slice(trimmed.length);
        const href = trimmed.startsWith('http') ? trimmed : 'https://' + trimmed;
        let host = '';
        try { host = new URL(href).hostname; } catch (e) { host = ''; }
        if (LINK_HOSTS.includes(host)) {
            const a = document.createElement('a');
            a.href = href;
            a.target = '_blank';
            a.rel = 'noopener noreferrer';
            a.className = 'underline text-primary-gold hover:text-white transition-colors';
            a.textContent = trimmed;
            container.appendChild(a);
        } else {
            container.appendChild(document.createTextNode(trimmed));
        }
        if (trailing) container.appendChild(document.createTextNode(trailing));
        lastIndex = match.index + raw.length;
    }
    if (lastIndex < text.length) {
        container.appendChild(document.createTextNode(text.slice(lastIndex)));
    }
}

// Graceful failure — every error path ends with a way to reach Lisa
function appendErrorBubble(messageContainer, friendlyText) {
    const errorDiv = document.createElement('div');
    errorDiv.className = 'flex items-start gap-3';
    errorDiv.innerHTML = `
        <div class="bg-red-500/20 rounded-full w-8 h-8 shrink-0 border border-red-500/40 flex items-center justify-center">
            <span class="material-symbols-outlined text-red-400 text-sm">error</span>
        </div>
        <div class="flex-1 flex-col max-w-[85%]">
            <div class="glass-bubble rounded-2xl rounded-tl-none px-4 py-3 bg-red-500/10 border-red-500/30">
                <p class="text-white/80 text-sm font-light"></p>
                <p class="text-white/60 text-sm font-light mt-2">Or reach Lisa directly: <a href="mailto:info@iconnect.studio" class="underline text-primary-gold hover:text-white transition-colors">info@iconnect.studio</a></p>
            </div>
        </div>
    `;
    errorDiv.querySelector('p').textContent = friendlyText;
    messageContainer.appendChild(errorDiv);
    messageContainer.scrollTop = messageContainer.scrollHeight;
}

// ===== Stack Inquiry Logging — captures every chat for Lisa's intelligence =====
// Session tracking: links multiple questions from one visitor in a single email thread
function getStackSession() {
    let sessionId = sessionStorage.getItem('stackSessionId');
    if (!sessionId) {
        sessionId = `s_${Date.now()}_${Math.random().toString(36).substring(2, 9)}`;
        sessionStorage.setItem('stackSessionId', sessionId);
    }
    const msgCount = parseInt(sessionStorage.getItem('stackMsgCount') || '0', 10) + 1;
    sessionStorage.setItem('stackMsgCount', msgCount.toString());
    return { sessionId, messageNumber: msgCount };
}

// Fire-and-forget submission to Netlify Forms — never blocks the UI
function logStackInquiry(data) {
    try {
        const formData = new URLSearchParams({
            'form-name': 'stack-inquiries',
            ...data
        });
        fetch('/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: formData.toString()
        }).catch(err => {
            // Silent fail — logging must never disrupt user experience
            console.warn('Inquiry log failed:', err);
        });
    } catch (err) {
        console.warn('Inquiry log error:', err);
    }
}
// ===== End logging block =====

// Send message function
async function sendMessage(message, source = 'typed') {
    const messageContainer = document.getElementById('messageContainer');
    const sendButton = document.getElementById('sendButton');
    const messageInput = document.getElementById('messageInput');

    // Disable input
    sendButton.disabled = true;
    messageInput.disabled = true;

    // Add user message — text rendered safely, never as HTML
    const userMessageDiv = document.createElement('div');
    userMessageDiv.className = 'flex items-start gap-3 justify-end';
    userMessageDiv.innerHTML = `
        <div class="flex-1 flex-col items-end max-w-[85%]">
            <div class="glass-bubble rounded-2xl rounded-tr-none px-4 py-3 bg-primary-gold/20 border-primary-gold/30 ml-auto">
                <p class="text-white/90 text-sm font-light leading-relaxed whitespace-pre-wrap"></p>
            </div>
        </div>
        <div class="bg-white/10 rounded-full w-8 h-8 shrink-0 border border-white/20 flex items-center justify-center">
            <span class="material-symbols-outlined text-white text-sm">person</span>
        </div>
    `;
    userMessageDiv.querySelector('p').textContent = message;
    messageContainer.appendChild(userMessageDiv);
    messageContainer.scrollTop = messageContainer.scrollHeight;

    // Record the visitor's turn
    chatHistory.push({ role: 'user', content: message });

    // Add loading indicator
    const loadingDiv = document.createElement('div');
    loadingDiv.className = 'flex items-start gap-3';
    loadingDiv.id = 'loading';
    loadingDiv.setAttribute('aria-label', 'Stack is typing');
    loadingDiv.innerHTML = `
        <div class="bg-primary-gold/20 rounded-full w-8 h-8 shrink-0 border border-primary-gold/40 flex items-center justify-center">
            <span class="text-xs font-bold text-primary-gold">STK</span>
        </div>
        <div class="flex-1 flex-col max-w-[85%]">
            <div class="glass-bubble rounded-2xl rounded-tl-none px-4 py-3">
                <div class="flex gap-1">
                    <div class="w-2 h-2 bg-white/40 rounded-full animate-bounce"></div>
                    <div class="w-2 h-2 bg-white/40 rounded-full animate-bounce" style="animation-delay: 0.1s"></div>
                    <div class="w-2 h-2 bg-white/40 rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
                </div>
            </div>
        </div>
    `;
    messageContainer.appendChild(loadingDiv);
    messageContainer.scrollTop = messageContainer.scrollHeight;

    try {
        // Call API — send the whole visible thread, capped to the last turns
        const response = await fetch('/.netlify/functions/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ messages: chatHistory.slice(-MAX_HISTORY_MESSAGES) })
        });

        const data = await response.json().catch(() => ({}));

        // Remove loading
        document.getElementById('loading').remove();

        if (!response.ok) {
            if (response.status === 429) {
                messagesRemaining = 0;
                document.getElementById('rateLimitText').textContent = '0 messages remaining this hour';
            }
            appendErrorBubble(messageContainer, data.error || 'Stack could not process that. Please try again.');
        } else {

        // Update rate limit
        if (response.headers.get('X-RateLimit-Remaining')) {
            messagesRemaining = parseInt(response.headers.get('X-RateLimit-Remaining'));
            document.getElementById('rateLimitText').textContent = `${messagesRemaining} messages remaining this hour`;
        }

        // Add Stack response — text rendered safely; site URLs become links
        const stackMessageDiv = document.createElement('div');
        stackMessageDiv.className = 'flex items-start gap-3';
        const responseText = data.content?.[0]?.text || 'Sorry, I encountered an error.';
        stackMessageDiv.innerHTML = `
            <div class="bg-primary-gold/20 rounded-full w-8 h-8 shrink-0 border border-primary-gold/40 flex items-center justify-center">
                <span class="text-xs font-bold text-primary-gold">STK</span>
            </div>
            <div class="flex-1 flex-col max-w-[85%]">
                <div class="glass-bubble rounded-2xl rounded-tl-none px-4 py-3">
                    <p class="text-white/80 text-sm font-light leading-relaxed whitespace-pre-wrap"></p>
                </div>
            </div>
        `;
        renderSafeText(stackMessageDiv.querySelector('p'), responseText);
        messageContainer.appendChild(stackMessageDiv);
        messageContainer.scrollTop = messageContainer.scrollHeight;

        // Record Stack's turn so follow-ups have context
        chatHistory.push({ role: 'assistant', content: responseText });

        // Log the inquiry to Netlify Forms — captures intelligence for Lisa
        // Fire-and-forget: never blocks UI, fails silently if it can't reach
        const { sessionId, messageNumber } = getStackSession();
        logStackInquiry({
            question: message,
            response: responseText,
            source: source,
            timestamp: new Date().toISOString(),
            sessionId: sessionId,
            messageNumber: messageNumber.toString(),
            userAgent: navigator.userAgent || '',
            referrer: document.referrer || '(direct)',
            language: navigator.language || '',
            viewport: `${window.innerWidth}x${window.innerHeight}`,
            screenSize: `${screen.width}x${screen.height}`,
            timezone: Intl.DateTimeFormat().resolvedOptions().timeZone || '',
            rateLimit: `${messagesRemaining} remaining`
        });

        }

    } catch (error) {
        console.error('Error:', error);
        const loading = document.getElementById('loading');
        if (loading) loading.remove();
        appendErrorBubble(messageContainer, 'Stack could not be reached. Check your connection and try again.');
    }

    // Re-enable input
    sendButton.disabled = false;
    messageInput.disabled = false;
    messageInput.value = '';
    messageInput.focus();
}

// Form submission
document.getElementById('chatForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const input = document.getElementById('messageInput');
    const message = input.value.trim();
    if (message) {
        sendMessage(message);
    }
});

// Sample questions
function askSampleQuestion(question) {
    sendMessage(question, 'chip');
}

// Chip scrolling
function scrollChips(direction) {
    const container = document.getElementById('chipContainer');
    const scrollAmount = 200;
    
    if (direction === 'left') {
        container.scrollLeft -= scrollAmount;
    } else {
        container.scrollLeft += scrollAmount;
    }
    
    // Update arrow visibility after scroll
    setTimeout(updateScrollArrows, 100);
}

// Update scroll arrow visibility
function updateScrollArrows() {
    const container = document.getElementById('chipContainer');
    const leftArrow = document.getElementById('scrollLeft');
    const rightArrow = document.getElementById('scrollRight');
    
    // Show left arrow if not at start
    if (container.scrollLeft > 0) {
        leftArrow.classList.remove('opacity-0', 'pointer-events-none');
    } else {
        leftArrow.classList.add('opacity-0', 'pointer-events-none');
    }
    
    // Show right arrow if not at end
    const isAtEnd = container.scrollLeft + container.clientWidth >= container.scrollWidth - 10;
    if (isAtEnd) {
        rightArrow.classList.add('opacity-0', 'pointer-events-none');
    } else {
        rightArrow.classList.remove('opacity-0', 'pointer-events-none');
    }
}

// Initialize scroll arrows on load
document.addEventListener('DOMContentLoaded', () => {
    const container = document.getElementById('chipContainer');
    
    // Update arrows on scroll
    container.addEventListener('scroll', updateScrollArrows);
    
    // Initial check
    updateScrollArrows();
});
</script>

<!-- =============================================================== -->
<!-- Netlify Forms detection — hidden static form for Stack inquiry  -->
<!-- intelligence logging. Never displayed. Each chat triggers a POST -->
<!-- to this form, which Netlify processes and emails to Lisa.        -->
<!-- =============================================================== -->
<form name="stack-inquiries" netlify netlify-honeypot="bot-field" hidden>
    <input type="text" name="question" />
    <textarea name="response"></textarea>
    <input type="text" name="source" />
    <input type="text" name="timestamp" />
    <input type="text" name="sessionId" />
    <input type="text" name="messageNumber" />
    <input type="text" name="userAgent" />
    <input type="text" name="referrer" />
    <input type="text" name="language" />
    <input type="text" name="viewport" />
    <input type="text" name="screenSize" />
    <input type="text" name="timezone" />
    <input type="text" name="rateLimit" />
    <input type="text" name="bot-field" />
</form>

</body>
